<!-- frontend/pages/missionplaner.html -->
<div class="mission-page">

    <!-- ================= MISSION OVERVIEW ================= -->
    <section class="control-section">
        <div class="section-header">
            <h3>
                <i class="fas fa-satellite-dish"></i>
                Mission Overview
            </h3>
        </div>

        <div class="mission-status-grid">

            <div class="mission-card">
                <i class="fas fa-clock"></i>
                <p>Mission Time</p>
                <h2>00:00:00</h2>
            </div>

            <div class="mission-card">
                <i class="fas fa-list-ol"></i>
                <p>Total Steps</p>
                <h2>0</h2>
            </div>

            <div class="mission-card">
                <i class="fas fa-location-arrow"></i>
                <p>Current Step</p>
                <h2>0</h2>
            </div>

            <div class="mission-card">
                <i class="fas fa-chart-line"></i>
                <p>Progress</p>
                <h2>0%</h2>
            </div>

        </div>
    </section>


    <!-- ================= ADD STEP ================= -->
    <section class="control-section">
        <div class="section-header">
            <h3>
                <i class="fas fa-plus-circle"></i>
                Add Mission Step
            </h3>
        </div>

        <form class="mission-form">

            <div class="form-group-mp">
                <label>Action Type</label>
                <select>
                    <option>Move Forward</option>
                    <option>Move Backward</option>
                    <option>Turn Left</option>
                    <option>Turn Right</option>
                    <option>Dive</option>
                    <option>Surface</option>
                    <option>Hold Position</option>
                </select>
            </div>

            <div class="form-group-mp">
                <label>Parameter</label>
                <input type="number" placeholder="ex: 10">
            </div>

            <div class="form-group-mp">
                <label>Duration (sec)</label>
                <input type="number" placeholder="ex: 5">
            </div>

            <div class="form-group-mp">
                <label>&nbsp;</label>
                <button class="btn btn-primary btn-full">
                    <i class="fas fa-plus"></i>
                    Add Step
                </button>
            </div>

        </form>
    </section>


    <!-- ================= MISSION QUEUE ================= -->
    <section class="control-section">
        <div class="section-header">
            <h3>
                <i class="fas fa-tasks"></i>
                Mission Queue
            </h3>
        </div>

        <div class="mission-steps-list">

            <!-- Step Item -->
            <div class="mission-step-item">
                <div class="step-number">01</div>

                <div class="step-info">
                    <h4>Move Forward</h4>
                    <p>Distance: 10 meters • Duration: 5 sec</p>
                </div>

                <div class="step-actions">
                    <button class="btn btn-secondary">
                        <i class="fas fa-edit"></i>
                    </button>

                    <button class="btn btn-danger">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>


            <div class="mission-step-item">
                <div class="step-number">02</div>

                <div class="step-info">
                    <h4>Dive</h4>
                    <p>Depth: 3 meters • Duration: 8 sec</p>
                </div>

                <div class="step-actions">
                    <button class="btn btn-secondary">
                        <i class="fas fa-edit"></i>
                    </button>

                    <button class="btn btn-danger">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

        </div>


        <!-- Footer Action -->
        <div class="mission-footer-actions">
            <button class="btn btn-primary">
                <i class="fas fa-play"></i>
                Start Mission
            </button>

            <button class="btn btn-secondary">
                <i class="fas fa-pause"></i>
                Pause
            </button>

            <button class="btn btn-danger">
                <i class="fas fa-trash-alt"></i>
                Clear All
            </button>
        </div>
    </section>

</div>
