<!-- frontend/pages/camerasettings.html -->
<div class="camera-settings-page">

    <!-- CAMERA SELECTION -->
    <section class="control-section">
        <div class="section-header">
            <h3><i class="fas fa-camera"></i> Camera Selection</h3>
        </div>

        <div class="camera-selection">
            <div class="camera-option active" data-camera="front">
                <span>Front Camera</span>
                <span class="status-badge offline">Offline</span>
            </div>

            <div class="camera-option" data-camera="bottom">
                <span>Bottom Camera</span>
                <span class="status-badge offline">Offline</span>
            </div>

            <div class="camera-option" data-camera="side">
                <span>Side Camera</span>
                <span class="status-badge offline">Offline</span>
            </div>
        </div>
    </section>


    <!-- MAIN -->
    <div class="camera-layout">

        <!-- LEFT: PREVIEW -->
        <section class="control-section preview-section">
            <div class="section-header">
                <h3><i class="fas fa-video"></i> Live Preview</h3>

                <div class="camera-controls">
                    <button id="settings-screenshot-btn" class="btn-icon" title="Screenshot">
                        <i class="fas fa-camera"></i>
                    </button>

                    <button id="settings-record-btn" class="btn-icon" title="Start Recording">
                        <i class="fas fa-video"></i>
                    </button>
                </div>
            </div>

            <div class="camera-feed">
                <img id="settings-camera-stream" class="camera-stream">

                <div class="camera-placeholder">
                    <i class="fas fa-camera"></i>
                    <p>Camera Offline</p>
                </div>

            </div>
        </section>


        <!-- RIGHT: ADJUSTMENT -->
        <section class="control-section">
            <div class="section-header">
                <h3><i class="fas fa-sliders-h"></i> Camera Adjustment</h3>
            </div>

            <div class="adjustment-list">

                <!-- item -->
                <div class="adjust-item">
                    <div class="adjust-head">
                        <span>Brightness</span>
                        <span class="adjust-value">50%</span>
                    </div>
                    <input type="range" class="adjust-slider" min="0" max="100" value="50">
                </div>

                <div class="adjust-item">
                    <div class="adjust-head">
                        <span>Contrast</span>
                        <span class="adjust-value">50%</span>
                    </div>
                    <input type="range" class="adjust-slider" min="0" max="100" value="50">
                </div>

                <div class="adjust-item">
                    <div class="adjust-head">
                        <span>White Balance</span>
                        <span class="adjust-value">50%</span>
                    </div>
                    <input type="range" class="adjust-slider" min="0" max="100" value="50">
                </div>

                <div class="adjust-item">
                    <div class="adjust-head">
                        <span>Gamma</span>
                        <span class="adjust-value">50%</span>
                    </div>
                    <input type="range" class="adjust-slider" min="0" max="100" value="50">
                </div>

                <div class="adjust-item">
                    <div class="adjust-head">
                        <span>Saturation</span>
                        <span class="adjust-value">50%</span>
                    </div>
                    <input type="range" class="adjust-slider" min="0" max="100" value="50">
                </div>

            </div>

            <div class="adjust-actions">
                <button class="btn btn-primary">Save</button>
                <button class="btn btn-secondary">Reset</button>
            </div>
        </section>

    </div>


    <!-- MEDIA -->
    <section class="control-section">
        <div class="section-header">
            <h3><i class="fas fa-photo-video"></i> Media</h3>
        </div>
        <div class="media-grid">
            <div class="media-list">
                <div class="media-item">
                    <i class="fas fa-image"></i>
                    <span>photo_001.jpg</span>
                    <button class="btn-icon"><i class="fas fa-download"></i></button>
                </div>

                <div class="media-item">
                    <i class="fas fa-image"></i>
                    <span>photo_002.jpg</span>
                    <button class="btn-icon"><i class="fas fa-download"></i></button>
                </div>

            </div>
            <div class="media-list">
                <div class="media-item">
                    <i class="fas fa-film"></i>
                    <span>video_001.mp4</span>
                    <button class="btn-icon"><i class="fas fa-download"></i></button>
                </div>

                <div class="media-item">
                    <i class="fas fa-film"></i>
                    <span>video_002.mp4</span>
                    <button class="btn-icon"><i class="fas fa-download"></i></button>
                </div>

            </div>
        </div>
        
    </section>

</div>
