<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seadiver Control</title>

    <link rel="stylesheet" href="/static/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>
<body>

    <!-- SIDEBAR -->
    <nav class="sidebar-icon-only">
        <div class="sidebar-header">
            <a href="#" class="logo">
                <img src="/static/assets/bai.jpg" alt="logo">
            </a>
        </div>

        <ul class="sidebar-menu">
            <li class="active">
                <a href="/" title="Dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/thruster-control" title="Thuster Control">
                    <i class="fas fa-bolt"></i>
                    <span>Thuster</span>
                </a>
            </li>
            <li>
                <a href="/mission-planner" title="Mission Planner">
                    <i class="fas fa-map-signs"></i>
                    <span>Mission</span>
                </a>
            </li>
            <li>
                <a href="/sensor" title="Sensor & PID Tuning">
                    <i class="fas fa-sliders-h"></i>
                    <span>Sensor</span>
                </a>
            </li>
            <li>
                <a href="/camera-settings" title="Camera Settings">
                    <i class="fas fa-camera"></i>
                    <span>Camera</span>
                </a>
            </li>
            <li>
                <a href="/connection" title="Connection" class="wifi-icon">
                    <i class="fas fa-wifi"></i>
                    <span>Connection</span>
                </a>
            </li>
            <li>
                <a href="/data-logging" title="Data Logging">
                    <i class="fas fa-database"></i>
                    <span>Datalog</span>
                </a>
            </li>
            <li>
                <a href="/system-setting" title="System Settings">
                    <i class="fas fa-cog"></i>
                    <span>System</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-overlay"></div>

    <!-- MAIN -->
    <div class="main-container">

        <header class="top-bar">
            <a href="#" class="logo-top">
                <img src="/static/assets/bai.jpg" alt="logo">
            </a>

            <div class="top-bar-title">
                <h4>Seadiver Control</h4>
                <h2>Dashboard Monitoring</h2>
            </div>

            <div class="status-indicator online">
                <span class="status-dot"></span>
                <span>System Online</span>
            </div>
        </header>

        <main class="main-content">
            {% include page %}
        </main>

    </div>

    <script src="/static/script.js"></script>
</body>
</html>
